# === Archeion app — merged BELOW the Lolipop access-restriction (Basic auth) block ===
# (deploy merges these lines into the live .htaccess so the panel's AuthType/Require stay.)
Options -Indexes
DirectoryIndex index.php

# Route anything that isn't a real file to the front controller. ErrorDocument is mod_alias
# (always available on shared hosting) — more robust here than mod_rewrite. Real files
# (style.css, figures) are still served by Apache directly.
ErrorDocument 404 /index.php

# Block direct web access to app internals (PHP reaches them via the filesystem).
RedirectMatch 403 ^/(bin|src|dist|db|data|test|node_modules)(/|$)

# Defense in depth: never serve the DB.
<FilesMatch "\.(db|db-wal|db-shm|sqlite)$">
  Require all denied
</FilesMatch>
