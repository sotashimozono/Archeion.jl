[sources]
# Not yet in the General registry — pin to GitHub (rev=main) instead of local sibling
# paths, so CI / a fresh clone can resolve them. ParamIO is a transitive dep of DataVault
# (not used directly here); it must sit in [deps] for its git-url source to apply during
# resolution, hence the Aqua stale_deps ignore in test/runtests.jl. Drop an entry once the
# package lands in General.
DataVault = {rev = "main", url = "https://github.com/sotashimozono/DataVault.jl"}
ParamIO = {rev = "main", url = "https://github.com/sotashimozono/ParamIO.jl"}
Pinax = {rev = "main", url = "https://github.com/sotashimozono/Pinax.jl"}

[compat]
